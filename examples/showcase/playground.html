<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground — Oxide</title>
    <meta name="description" content="Interactive playground: Oxide SPA with demos and component playgrounds." />
    <style>
        /* ═══════ RESET & CSS VARIABLES ═══════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e;
            --fg: #e0e0e0; --fg2: #888; --fg3: #555;
            --accent: #f97316; --accent2: #ef4444;
            --green: #22c55e; --blue: #3b82f6; --purple: #a855f7;
            --radius: 10px; --gap: 1rem;
            --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
            --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            --glow: rgba(249, 115, 22, 0.15);
            --max-w: 1200px;
        }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font); background: var(--bg); color: var(--fg); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        pre, code { font-family: var(--mono); overflow-x: auto; max-width: 100%; }
        pre { white-space: pre; word-wrap: normal; }
        img { max-width: 100%; }

        /* ═══════ UTILITY ═══════ */
        .container { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; }
        .gradient-text { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        /* ═══════ APP SHELL ═══════ */
        .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,10,10,0.85); backdrop-filter: blur(16px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .app-header .container { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .app-nav { display: flex; align-items: center; gap: 1.5rem; }
        .app-nav a { color: var(--fg2); font-size: 0.85rem; font-weight: 500; transition: color 0.2s; cursor: pointer; }
        .app-nav a:hover { color: var(--fg); text-decoration: none; }
        .app-nav a.active { color: var(--accent); }
        .app-content { flex: 1; padding-top: 80px; padding-bottom: 3rem; }
        .logo { font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 0.4rem; }
        .logo a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .logo-emoji { font-size: 1.4rem; -webkit-text-fill-color: initial; }
        .gh-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid var(--fg3); color: var(--fg) !important; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .gh-btn:hover { border-color: var(--accent); color: var(--accent) !important; text-decoration: none; }

        /* Hamburger menu */
        .nav-toggle { display: none; cursor: pointer; flex-direction: column; gap: 4px; z-index: 101; background: none; border: none; padding: 4px; }
        .nav-toggle span { display: block; width: 20px; height: 2px; background: var(--fg); transition: all 0.3s; }

        /* ═══════ PLAYGROUND PAGE LAYOUT ═══════ */
        .pg-page { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; }
        .pg-page h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .pg-desc { color: var(--fg2); font-size: 1rem; margin-bottom: 1.5rem; max-width: 600px; }
        .pg-back { display: inline-block; color: var(--fg2); font-size: 0.85rem; margin-bottom: 1rem; cursor: pointer; transition: color 0.2s; }
        .pg-back:hover { color: var(--accent); text-decoration: none; }
        .pg-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .pg-preview { padding: 2rem; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; min-height: 150px; }
        .pg-controls { display: flex; flex-direction: column; gap: 1rem; }
        .pg-code { background: #0d1117; border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.25rem; font-size: 0.82rem; line-height: 1.6; color: #c9d1d9; overflow-x: auto; }
        .pg-api { margin-top: 2rem; }
        .pg-api h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--fg); }
        .api-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .api-table th { text-align: left; padding: 0.5rem 0.75rem; background: var(--bg3); color: var(--fg2); font-weight: 600; border-bottom: 1px solid #333; }
        .api-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--fg2); }
        .api-table td:first-child code { color: var(--accent); font-size: 0.8rem; }
        .api-table td:last-child { color: var(--fg); }
        .api-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* ═══════ COMPONENT CATALOG ═══════ */
        .catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .catalog-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.25rem; cursor: pointer; transition: all 0.25s; }
        .catalog-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-3px); box-shadow: 0 4px 20px rgba(249,115,22,0.08); }
        .catalog-card .cc-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
        .catalog-card .cc-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .catalog-card .cc-desc { font-size: 0.8rem; color: var(--fg2); line-height: 1.5; }

        /* ═══════ DEMOS PAGE ═══════ */
        .demo-section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
        .demo-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }

        /* ═══════ HOME PAGE ═══════ */
        .home-hero { text-align: center; padding: 4rem 0 3rem; }
        .home-hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 0.75rem; }
        .home-hero p { color: var(--fg2); font-size: 1.1rem; max-width: 600px; margin: 0 auto 2rem; }
        .home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 700px; margin: 0 auto; }
        .home-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 2rem; cursor: pointer; transition: all 0.25s; text-align: left; }
        .home-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-2px); }
        .home-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .home-card p { color: var(--fg2); font-size: 0.9rem; }

        /* ═══════ SHARED COMPONENT STYLES ═══════ */
        button, .btn { padding: 0.45rem 1rem; font-size: 0.85rem; border: 1px solid var(--fg3); border-radius: 6px; background: var(--bg3); color: var(--fg); cursor: pointer; transition: all 0.15s; font-family: var(--font); }
        button:hover, .btn:hover { border-color: var(--accent); color: var(--accent); }
        button:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; font-weight: 600; }
        .btn-primary:hover { opacity: 0.9; color: white; }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
        .btn-danger { border-color: var(--accent2); color: var(--accent2); }
        .btn-danger:hover { background: var(--accent2); color: white; }
        input[type="text"], input[type="number"], input[type="url"], input[type="email"], input[type="password"], textarea, select { background: var(--bg); border: 1px solid var(--fg3); border-radius: 6px; padding: 0.45rem 0.7rem; color: var(--fg); font-family: var(--font); font-size: 0.85rem; outline: none; transition: border-color 0.15s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        input[type="color"] { width: 50px; height: 32px; border: 1px solid var(--fg3); border-radius: 6px; cursor: pointer; }
        input[type="checkbox"] { accent-color: var(--accent); width: 18px; height: 18px; }
        .row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; gap: 0.5rem; }
        .big-num { font-size: 3rem; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; }
        .mono { font-family: var(--mono); }

        /* ═══════ DEMO-SPECIFIC CSS ═══════ */
        .counter-btns button { min-width: 60px; font-size: 1.2rem; }
        .temp-row { display: flex; align-items: center; gap: 1rem; }
        .temp-row label { font-size: 0.8rem; color: var(--fg2); min-width: 70px; }
        .temp-row input { width: 120px; }
        .todo-input-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .todo-input-row input { flex: 1; }
        .todo-list { list-style: none; }
        .todo-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.5rem 0; border-bottom: 1px solid var(--bg3); }
        .todo-item.done span { text-decoration: line-through; color: var(--fg3); }
        .todo-item span { flex: 1; }
        .todo-filters { display: flex; gap: 0.3rem; margin-bottom: 0.7rem; }
        .todo-filters button.active { border-color: var(--accent); color: var(--accent); }
        .todo-count { font-size: 0.8rem; color: var(--fg2); margin-top: 0.5rem; }
        .stopwatch-time { font-size: 3.5rem; font-family: var(--mono); text-align: center; font-variant-numeric: tabular-nums; }
        .stopwatch-btns { display: flex; gap: 0.5rem; justify-content: center; margin-top: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-field label { display: block; font-size: 0.75rem; color: var(--fg2); margin-bottom: 0.3rem; }
        .form-field input, .form-field select, .form-field textarea { width: 100%; }
        .form-output { margin-top: 1rem; padding: 0.7rem; background: var(--bg); border-radius: 6px; font-size: 0.8rem; }
        .form-output code { color: var(--accent); }
        .fetch-result { max-height: 250px; overflow-y: auto; font-size: 0.8rem; font-family: var(--mono); background: var(--bg); padding: 0.7rem; border-radius: 6px; white-space: pre-wrap; word-break: break-all; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--fg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .mouse-area { position: relative; height: 200px; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--fg3); cursor: crosshair; }
        .mouse-dot { position: absolute; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; box-shadow: 0 0 12px var(--accent); }
        .mouse-coords { text-align: center; margin-top: 0.5rem; font-family: var(--mono); font-size: 0.9rem; color: var(--fg2); }
        .key-display { min-height: 80px; display: flex; align-items: center; justify-content: center; background: var(--bg); border-radius: 6px; border: 1px solid var(--fg3); }
        .key-cap { padding: 0.8rem 1.5rem; border: 2px solid var(--accent); border-radius: 8px; font-size: 1.5rem; font-family: var(--mono); background: var(--bg2); min-width: 60px; text-align: center; box-shadow: 0 3px 0 var(--fg3); }
        .key-info { margin-top: 0.5rem; font-size: 0.8rem; color: var(--fg2); text-align: center; }
        .canvas-wrap canvas { width: 100%; border-radius: 6px; border: 1px solid var(--fg3); cursor: crosshair; background: #111; }
        .canvas-tools { display: flex; gap: 0.5rem; margin-bottom: 0.7rem; align-items: center; }
        .canvas-tools label { font-size: 0.8rem; color: var(--fg2); }
        .theme-preview { padding: 1rem; border-radius: 6px; transition: all 0.3s; }
        .theme-preview.light { background: #f5f5f5; color: #1a1a1a; }
        .theme-preview.dark { background: var(--bg); color: var(--fg); }
        .notes-area { width: 100%; min-height: 150px; }
        .notes-status { font-size: 0.75rem; color: var(--fg3); margin-top: 0.3rem; }
        .anim-stage { position: relative; height: 200px; background: var(--bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--fg3); }
        .anim-ball { position: absolute; width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 15px var(--accent); }
        .chart-wrap svg { width: 100%; height: 200px; }
        .chart-bar { transition: height 0.3s, y 0.3s; }
        .chart-label { font-size: 11px; fill: var(--fg2); font-family: var(--font); }
        .chart-value { font-size: 10px; fill: var(--fg); font-family: var(--mono); }
        .chart-btns { display: flex; gap: 0.5rem; margin-top: 0.7rem; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal { background: var(--bg2); border: 1px solid var(--fg3); border-radius: var(--radius); padding: 2rem; max-width: 400px; width: 90%; }
        .modal h3 { margin-bottom: 0.5rem; }
        .modal p { color: var(--fg2); font-size: 0.9rem; margin-bottom: 1rem; }
        .hidden { display: none !important; }
        .dnd-container { display: flex; gap: 1rem; }
        .dnd-pool, .dnd-drop { flex: 1; min-height: 120px; padding: 0.7rem; border: 2px dashed var(--fg3); border-radius: 6px; background: var(--bg); }
        .dnd-drop.over { border-color: var(--accent); background: rgba(249,115,22,0.05); }
        .dnd-chip { display: inline-block; padding: 0.3rem 0.8rem; margin: 0.2rem; background: var(--bg3); border: 1px solid var(--fg3); border-radius: 6px; font-size: 0.8rem; cursor: grab; }
        .dnd-chip:active { cursor: grabbing; }
        .dnd-label { font-size: 0.7rem; color: var(--fg3); margin-bottom: 0.4rem; }
        .clip-text { background: var(--bg); padding: 0.5rem 0.7rem; border-radius: 6px; font-family: var(--mono); font-size: 0.85rem; border: 1px solid var(--fg3); }
        .clip-toast { color: var(--green); font-size: 0.8rem; margin-left: 0.5rem; opacity: 0; transition: opacity 0.3s; }
        .clip-toast.show { opacity: 1; }

        /* ═══════ RESPONSIVE ═══════ */
        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .nav-toggle { display: flex; }
            .app-nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0; right: 0;
                background: var(--bg2);
                border-bottom: 1px solid var(--fg3);
                flex-direction: column;
                padding: 1rem 2rem;
                gap: 0.75rem;
                z-index: 100;
            }
            .app-nav.open { display: flex; }
            .app-nav a { font-size: 0.9rem; padding: 0.4rem 0; }
            .app-header .container { position: relative; }
            .gh-btn { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
            .pg-layout { grid-template-columns: 1fr; }
            .catalog-grid { grid-template-columns: repeat(2, 1fr); }
            .home-cards { grid-template-columns: 1fr; }
            .form-grid { grid-template-columns: 1fr; }
            .dnd-container { flex-direction: column; }
        }
        @media (max-width: 480px) {
            .catalog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import init from './pkg/oxide_showcase.js';
        init();
    </script>
</body>
</html>
