<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oxide — Rust Web Framework</title>
    <meta name="description" content="Build web apps in Rust. Fine-grained reactivity, zero JavaScript, direct DOM manipulation. Compiles to WebAssembly." />

    <!-- Favicon (inline SVG — no external file) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Oxide — Rust Web Framework" />
    <meta property="og:description" content="Build reactive web apps entirely in Rust. Fine-grained signals, zero JavaScript, 48 components, compiles to WebAssembly." />
    <meta property="og:url" content="https://ievangelist.github.io/Oxide/" />
    <meta property="og:site_name" content="Oxide" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Oxide — Rust Web Framework" />
    <meta name="twitter:description" content="Build reactive web apps entirely in Rust. Fine-grained signals, zero JavaScript, 48 components, compiles to WebAssembly." />
    <style>
        /* ═══════ RESET & CSS VARIABLES ═══════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --bg2: #141414; --bg3: #1e1e1e;
            --fg: #e0e0e0; --fg2: #888; --fg3: #555;
            --accent: #f97316; --accent2: #ef4444;
            --green: #22c55e; --blue: #3b82f6; --purple: #a855f7;
            --radius: 10px; --gap: 1rem;
            --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
            --mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
            --glow: rgba(249, 115, 22, 0.15);
            --max-w: 1200px;
        }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font); background: var(--bg); color: var(--fg); line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
        pre, code { font-family: var(--mono); overflow-x: auto; max-width: 100%; }
        pre { white-space: pre; word-wrap: normal; }
        img { max-width: 100%; }

        /* ═══════ UTILITY ═══════ */
        .container { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; }
        .gradient-text { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
        .section-title { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.15; margin-bottom: 0.75rem; }
        .section-sub { color: var(--fg2); font-size: 1.05rem; max-width: 600px; line-height: 1.7; }

        /* ═══════ ANIMATIONS ═══════ */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { opacity: 0; animation: fadeUp 0.7s ease-out forwards; }
        .fade-in.d1 { animation-delay: 0.1s; } .fade-in.d2 { animation-delay: 0.2s; }
        .fade-in.d3 { animation-delay: 0.3s; } .fade-in.d4 { animation-delay: 0.4s; }
        .fade-in.d5 { animation-delay: 0.5s; } .fade-in.d6 { animation-delay: 0.6s; }
        .fade-in.d7 { animation-delay: 0.7s; } .fade-in.d8 { animation-delay: 0.8s; }

        /* ═══════ FLOATING ORBS ═══════ */
        @keyframes floatOrb { 0%, 100% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-40px) scale(1.05); } 66% { transform: translate(-20px,20px) scale(0.95); } }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; animation: floatOrb 20s ease-in-out infinite; }
        .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
        .orb-2 { width: 400px; height: 400px; background: var(--accent2); top: 200px; right: -150px; animation-delay: -7s; }
        .orb-3 { width: 350px; height: 350px; background: var(--purple); bottom: -50px; left: 30%; animation-delay: -13s; }

        /* ═══════ APP SHELL ═══════ */
        .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
        .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,10,10,0.85); backdrop-filter: blur(16px) saturate(180%); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .app-header .container { display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .app-nav { display: flex; align-items: center; gap: 1.5rem; }
        .app-nav a { color: var(--fg2); font-size: 0.85rem; font-weight: 500; transition: color 0.2s; cursor: pointer; }
        .app-nav a:hover { color: var(--fg); text-decoration: none; }
        .app-nav a.active { color: var(--accent); }
        .app-content { flex: 1; padding-top: 80px; padding-bottom: 3rem; }
        .logo { font-size: 1.25rem; font-weight: 800; display: flex; align-items: center; gap: 0.4rem; }
        .logo a { color: inherit; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; }
        .logo-emoji { font-size: 1.4rem; -webkit-text-fill-color: initial; }
        .gh-btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid var(--fg3); color: var(--fg) !important; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; }
        .gh-btn:hover { border-color: var(--accent); color: var(--accent) !important; text-decoration: none; }
        .gh-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* Hamburger menu */
        .nav-toggle { display: none; cursor: pointer; flex-direction: column; gap: 4px; z-index: 101; background: none; border: none; padding: 4px; }
        .nav-toggle span { display: block; width: 20px; height: 2px; background: var(--fg); transition: all 0.3s; }

        /* ═══════ HERO (landing page) ═══════ */
        .landing .hero { position: relative; min-height: 100vh; display: flex; align-items: center; padding-top: 80px; overflow: hidden; }
        .landing .hero .container { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; width: 100%; }
        .hero-text h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; line-height: 1.08; letter-spacing: -0.03em; margin-bottom: 1.25rem; }
        .hero-text h1 .rust-word { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--purple) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .hero-text p { color: var(--fg2); font-size: 1.15rem; line-height: 1.7; margin-bottom: 2rem; max-width: 480px; }
        .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
        .hero-btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border-radius: 8px; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .hero-btn-primary:hover { opacity: 0.92; transform: translateY(-1px); text-decoration: none; color: #fff; }
        .hero-btn-outline { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.75rem; border-radius: 8px; font-size: 1rem; font-weight: 600; background: transparent; color: var(--fg); border: 1px solid var(--fg3); cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .hero-btn-outline:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

        /* Hero code block */
        .hero-code { background: #0d1117; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 40px rgba(249,115,22,0.06); }
        .hero-code-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-r { background: #ff5f57; } .dot-y { background: #febc2e; } .dot-g { background: #28c840; }
        .hero-code-header span { margin-left: 0.5rem; font-size: 0.75rem; color: var(--fg3); }
        .hero-code pre { padding: 1.25rem; font-size: 0.85rem; line-height: 1.65; color: #c9d1d9; }
        .kw { color: #ff7b72; } .fn { color: #d2a8ff; } .str { color: #a5d6ff; } .num { color: #79c0ff; }
        .cmt { color: #8b949e; } .type { color: #ffa657; } .tag-name { color: #7ee787; }
        .attr { color: #79c0ff; } .punct { color: #8b949e; }

        /* ═══════ FEATURES ═══════ */
        .features-section { padding: 7rem 0; }
        .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
        .feature-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 2rem 1.75rem; backdrop-filter: blur(8px); transition: all 0.3s ease; }
        .feature-card:hover { transform: translateY(-4px); border-color: rgba(249,115,22,0.25); box-shadow: 0 12px 40px rgba(249,115,22,0.08); }
        .feature-icon { font-size: 1.75rem; margin-bottom: 1rem; }
        .feature-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .feature-card p { color: var(--fg2); font-size: 0.88rem; line-height: 1.65; }

        /* ═══════ CLI SECTION ═══════ */
        .cli-section { padding: 7rem 0; }
        .cli-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
        .cli-card { background: #0d1117; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; transition: all 0.3s; }
        .cli-card:hover { border-color: rgba(249,115,22,0.25); box-shadow: 0 8px 30px rgba(249,115,22,0.06); }
        .cli-card-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1rem; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .cli-card-header .dot { width: 8px; height: 8px; }
        .cli-card-body { padding: 1.25rem; }
        .cli-cmd { font-family: var(--mono); font-size: 0.9rem; color: var(--green); margin-bottom: 0.75rem; }
        .cli-cmd .prompt { color: var(--fg3); }
        .cli-output { font-family: var(--mono); font-size: 0.78rem; color: var(--fg2); line-height: 1.6; }
        .cli-note { margin-top: 2rem; padding: 1rem 1.25rem; background: rgba(249,115,22,0.05); border: 1px solid rgba(249,115,22,0.15); border-radius: 10px; font-size: 0.85rem; color: var(--fg2); }
        .cli-note strong { color: var(--accent); }

        /* ═══════ STATS ═══════ */
        .stats-section { padding: 4rem 0; border-top: 1px solid rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; }
        .stat-card { text-align: center; padding: 2rem 1rem; }
        .stat-num { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
        .stat-label { color: var(--fg2); font-size: 0.9rem; margin-top: 0.4rem; }

        /* ═══════ PRODUCTION READY ═══════ */
        .production-section { padding: 7rem 0; }
        .production-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 3rem; }

        /* ═══════ BENCHMARKS ═══════ */
        .benchmarks-section { padding: 7rem 0; }
        .bench-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; margin-top: 3rem; }
        .bar-chart { display: flex; flex-direction: column; gap: 0.75rem; }
        .bar-row { display: flex; align-items: center; gap: 0.75rem; }
        .bar-framework { width: 65px; font-size: 0.8rem; color: var(--fg2); text-align: right; font-weight: 500; flex-shrink: 0; }
        .bar-track { flex: 1; height: 32px; background: rgba(255,255,255,0.03); border-radius: 6px; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 6px; background: rgba(255,255,255,0.08); display: flex; align-items: center; padding-left: 0.75rem; font-size: 0.75rem; font-weight: 600; color: var(--fg2); transition: width 1s ease; }
        .bar-fill.oxide-bar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
        .bar-size { white-space: nowrap; }
        .table-wrap { overflow-x: auto; }
        .comparison-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .comparison-table th { padding: 0.6rem 0.5rem; text-align: left; border-bottom: 2px solid rgba(255,255,255,0.1); font-weight: 700; color: var(--fg); font-size: 0.75rem; }
        .comparison-table th:first-child { width: 110px; }
        .comparison-table td { padding: 0.55rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--fg2); }
        .comparison-table tr:hover td { background: rgba(255,255,255,0.02); }
        .comparison-table .col-oxide { color: var(--accent); font-weight: 600; }
        .check-yes { color: var(--green); } .check-no { color: var(--accent2); }

        /* ═══════ FEATURED DEMOS ═══════ */
        .demos-section { padding: 7rem 0; }
        .demo-featured { display: flex; flex-direction: column; gap: 2.5rem; margin-top: 3rem; }
        .demo-card { display: grid; grid-template-columns: 1fr 1fr; gap: 0; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; overflow: hidden; transition: border-color 0.3s; }
        .demo-card:hover { border-color: rgba(249,115,22,0.2); }
        .demo-code-panel { background: #0d1117; padding: 1.5rem; border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; }
        .demo-code-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg3); margin-bottom: 0.75rem; font-weight: 600; }
        .demo-code-panel pre { font-size: 0.8rem; line-height: 1.6; color: #c9d1d9; flex: 1; }
        .demo-live-panel { padding: 1.5rem; display: flex; flex-direction: column; }
        .demo-live-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg3); margin-bottom: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .live-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .demo-live-panel > div { flex: 1; }
        .see-all { display: inline-flex; align-items: center; gap: 0.5rem; margin-top: 2rem; padding: 0.75rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; border: 1px solid var(--fg3); color: var(--fg); transition: all 0.2s; text-decoration: none; cursor: pointer; }
        .see-all:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

        /* ═══════ FOOTER ═══════ */
        .site-footer { padding: 4rem 0 3rem; border-top: 1px solid rgba(255,255,255,0.04); text-align: center; }
        .footer-brand { font-size: 1rem; color: var(--fg2); margin-bottom: 1rem; }
        .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 1.5rem; }
        .footer-links a { color: var(--fg3); font-size: 0.85rem; transition: color 0.2s; cursor: pointer; }
        .footer-links a:hover { color: var(--accent); text-decoration: none; }
        .footer-tagline { color: var(--fg3); font-size: 0.8rem; font-style: italic; }

        /* ═══════ SHARED COMPONENT STYLES ═══════ */
        button, .btn { padding: 0.45rem 1rem; font-size: 0.85rem; border: 1px solid var(--fg3); border-radius: 6px; background: var(--bg3); color: var(--fg); cursor: pointer; transition: all 0.15s; font-family: var(--font); }
        button:hover, .btn:hover { border-color: var(--accent); color: var(--accent); }
        button:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; font-weight: 600; }
        .btn-primary:hover { opacity: 0.9; color: white; }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.75rem; }
        .btn-danger { border-color: var(--accent2); color: var(--accent2); }
        .btn-danger:hover { background: var(--accent2); color: white; }
        input[type="text"], input[type="number"], input[type="url"], input[type="email"], input[type="password"], textarea, select { background: var(--bg); border: 1px solid var(--fg3); border-radius: 6px; padding: 0.45rem 0.7rem; color: var(--fg); font-family: var(--font); font-size: 0.85rem; outline: none; transition: border-color 0.15s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { resize: vertical; }
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        input[type="color"] { width: 50px; height: 32px; border: 1px solid var(--fg3); border-radius: 6px; cursor: pointer; }
        input[type="checkbox"] { accent-color: var(--accent); width: 18px; height: 18px; }
        .row { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
        .col { display: flex; flex-direction: column; gap: 0.5rem; }
        .big-num { font-size: 3rem; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; }
        .mono { font-family: var(--mono); }

        /* ═══════ PLAYGROUND PAGE LAYOUT ═══════ */
        .pg-page { max-width: var(--max-w); margin: 0 auto; padding: 0 2rem; }
        .pg-page h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .pg-desc { color: var(--fg2); font-size: 1rem; margin-bottom: 1.5rem; max-width: 600px; }
        .pg-back { display: inline-block; color: var(--fg2); font-size: 0.85rem; margin-bottom: 1rem; cursor: pointer; transition: color 0.2s; }
        .pg-back:hover { color: var(--accent); text-decoration: none; }
        .pg-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .pg-preview { padding: 2rem; border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius); background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; min-height: 150px; }
        .pg-controls { display: flex; flex-direction: column; gap: 1rem; }
        .pg-code { background: #0d1117; border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.25rem; font-size: 0.82rem; line-height: 1.6; color: #c9d1d9; overflow-x: auto; }
        .pg-api { margin-top: 2rem; overflow-x: auto; }
        .pg-api h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--fg); }
        .api-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .api-table th { text-align: left; padding: 0.5rem 0.75rem; background: var(--bg3); color: var(--fg2); font-weight: 600; border-bottom: 1px solid #333; }
        .api-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--fg2); }
        .api-table td:first-child code { color: var(--accent); font-size: 0.8rem; }
        .api-table td:last-child { color: var(--fg); }
        .api-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* ═══════ COMPONENT CATALOG ═══════ */
        .catalog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .catalog-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.25rem; cursor: pointer; transition: all 0.25s; }
        .catalog-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-3px); box-shadow: 0 4px 20px rgba(249,115,22,0.08); }
        .catalog-card .cc-icon { font-size: 1.6rem; margin-bottom: 0.4rem; }
        .catalog-card .cc-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .catalog-card .cc-desc { font-size: 0.8rem; color: var(--fg2); line-height: 1.5; }

        /* ═══════ DEMOS PAGE ═══════ */
        .demo-section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
        .demo-section h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); }

        /* ═══════ HOME PAGE (playground home) ═══════ */
        .home-hero { text-align: center; padding: 4rem 0 3rem; }
        .home-hero h1 { font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; margin-bottom: 0.75rem; }
        .home-hero p { color: var(--fg2); font-size: 1.1rem; max-width: 600px; margin: 0 auto 2rem; }
        .home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; max-width: 700px; margin: 0 auto; }
        .home-card { background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 2rem; cursor: pointer; transition: all 0.25s; text-align: left; }
        .home-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-2px); }
        .home-card h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .home-card p { color: var(--fg2); font-size: 0.9rem; }

        /* ═══════ DEMO-SPECIFIC CSS ═══════ */
        .counter-btns button { min-width: 60px; font-size: 1.2rem; }
        .temp-row { display: flex; align-items: center; gap: 1rem; }
        .temp-row label { font-size: 0.8rem; color: var(--fg2); min-width: 70px; }
        .temp-row input { width: 120px; }
        .todo-input-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
